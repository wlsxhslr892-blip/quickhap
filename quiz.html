<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>무료 모의고사 - 퀵합격</title>
    <meta name="description" content="퀵합격 무료 모의고사입니다. 문제를 풀고 즉시 점수와 해설을 확인하세요.">
    <link rel="stylesheet" href="./assets/styles.css">
    <script src="./assets/ads.js" defer></script>
    <script src="./assets/quiz.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">퀵합격</a>
      <nav class="top-nav" aria-label="주요 메뉴">
        <a href="./certifications.html">자격증</a>
        <a id="navCertificateLink" href="./certificate.html?id=wihummul-gineungsa">학습정보</a>
        <a href="./wrong-note.html">오답노트</a>
        <a href="./favorites.html">즐겨찾기</a>
      </nav>
    </header>

    <main class="quiz-shell">
      <section class="quiz-top">
        <div>
          <p id="quizEyebrow" class="eyebrow">무료 모의고사</p>
          <h1 id="quizTitle">예상문제</h1>
          <p id="quizSummary" class="quiz-description">문제를 불러오는 중입니다.</p>
        </div>
        <div class="score-box" aria-live="polite">
          <span>진행률</span>
          <strong id="progressText">0 / 0</strong>
        </div>
      </section>

      <section id="quizList" class="quiz-list" aria-label="문제 목록"></section>

      <section class="submit-panel" id="submitPanel" hidden>
        <button class="button primary" id="submitExamButton" type="button">채점하기</button>
      </section>

      <section class="result-panel" id="resultPanel" hidden>
        <h2>채점 결과</h2>
        <p id="resultText"></p>
        <div class="hero-actions">
          <button class="button primary" id="retryButton" type="button">다시 풀기</button>
          <a class="button secondary" href="./wrong-note.html">오답노트 보기</a>
        </div>
      </section>
    </main>
  </body>
</html>
